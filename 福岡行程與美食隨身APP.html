            { id: 'hanayoshi', name: '花由餐廳 (大分和牛懷石)', area: '由布院 (旅館內)', type: '懷石料理', dist: '住宿享用', role: 'dinner', noBeef: '享用套餐內的海鮮與配菜 (和牛請親友代勞)', noChicken: '正常享用 (以和牛海鮮為主)', map: 'https://www.google.com/maps/search/?api=1&query=ゆふいん花由', desc: '⚠️ 此餐不可更改菜式 (包含過敏、忌口、不吃生魚等)，入住前及當日均無法變更。包含阿蘇熔岩石板燒黑毛和牛。' },
            { id: 'shin', name: '由布まぶし 心', area: '由布院站前', type: '釜飯三吃', dist: '由布院步行 10 分', role: 'backup', noBeef: '鰻魚釜飯 (推薦)、地雞釜飯', noChicken: '鰻魚釜飯、豐後牛釜飯', map: 'https://www.google.com/maps/search/?api=1&query=由布まぶし+心+駅前支店', desc: '由布院排隊名店，一鍋三吃（原味、拌佐料、茶泡飯）。' },
            { id: 'izumi', name: '古式手打ちそば 泉', area: '由布院 (金鱗湖旁)', type: '手打蕎麥麵', dist: '由布院步行 20 分', role: 'backup', noBeef: '天婦羅蕎麥麵、豆腐料理', noChicken: '天婦羅蕎麥麵、豆腐料理', map: 'https://www.google.com/maps/search/?api=1&query=古式手打ちそば+泉+金鱗湖', desc: '位於金鱗湖畔，可以一邊欣賞美景一邊品嚐道地的手打麵。' },
            { id: 'kunugi', name: '櫟の丘 (Kunugi no Oka)', area: '由布院 (郊區山丘)', type: '柴燒披薩', dist: '車程 5 分', role: 'backup', noBeef: '瑪格麗特披薩、海鮮義大利麵', noChicken: '培根蘑菇披薩、海鮮義大利麵', map: 'https://www.google.com/maps/search/?api=1&query=櫟の丘+由布院', desc: '坐擁由布院絕佳風景的景觀餐廳，招牌是正宗的柴燒石窯披薩與手工義大利麵。' },
            { id: 'laruche', name: 'Café La Ruche', area: '由布院 (金鱗湖畔)', type: '湖畔咖啡輕食', dist: '由布院步行 20 分', role: 'backup', noBeef: '明太子奶油義大利麵、可頌三明治', noChicken: '明太子奶油義大利麵、沙拉拼盤', map: 'https://www.google.com/maps/search/?api=1&query=Cafe+La+Ruche+由布院', desc: '位於金鱗湖畔的絕美咖啡館。可以一邊喝咖啡、吃輕食，一邊欣賞夢幻的湖景。' }
        ];

        function switchView(view) {
            currentView = view;
            window.scrollTo({ top: 0, behavior: 'smooth' });
            render();
        }

        function render() {
            const main = document.getElementById('main-content');
            
            if (currentView === 'itinerary') {
                let html = '';
                
                // 即時切換天數的吸頂導航列
                html += `<div class="sticky top-[60px] z-30 bg-white/95 backdrop-blur-md py-2.5 border-b border-gray-100 shadow-sm flex gap-2 px-4 overflow-x-auto hide-scrollbar whitespace-nowrap">`;
                itineraryData.forEach((day, idx) => {
                    html += `<button onclick="document.getElementById('day-${idx}').scrollIntoView({behavior: 'smooth'})" class="px-3.5 py-1.5 bg-gray-100 border border-gray-200 rounded-full text-xs font-black text-gray-600 shadow-sm active:scale-95 transition-all focus:bg-gray-800 focus:text-white focus:border-gray-800 no-select">${day.day}</button>`;
                });
                html += `</div>`;

                html += '<div class="p-4 space-y-6 animate-fadeIn">';

                // 產生每日行程
                itineraryData.forEach((day, idx) => {
                    // 加入 id 與 scroll-mt-safe 確保點擊跳轉時位置精準
                    html += `
                    <div id="day-${idx}" class="bg-white rounded-[1.5rem] shadow-sm border border-gray-100 overflow-hidden scroll-mt-safe">
                        <div class="bg-gray-800 text-white p-4 relative overflow-hidden">
                            <div class="absolute -right-4 -top-4 opacity-10">
                                <i data-lucide="map" class="w-24 h-24"></i>
                            </div>
                            <div class="relative z-10 flex items-end justify-between mb-1">
                                <span class="text-xl font-black">${day.day}</span>
                                <span class="text-sm font-bold text-gray-300">${day.date}</span>
                            </div>
                            <div class="relative z-10 text-sm font-medium text-orange-400">${day.title}</div>
                        </div>
                        <div class="p-4">
                    `;
                    
                    day.items.forEach(item => {
                        const style = typeConfig[item.type] || typeConfig.other;
                        
                        html += `
                            <div class="flex gap-3 relative z-10 py-1 group">
                                <!-- 左側時間 -->
                                <div class="w-11 text-right shrink-0 pt-1">
                                    <span class="text-[13px] font-black text-gray-800 tracking-tighter">${item.time}</span>
                                </div>
                                
                                <!-- 中間時間軸與圖示 (視覺化配色) -->
                                <div class="flex flex-col items-center">
                                    <div class="w-7 h-7 rounded-full border-[1.5px] flex items-center justify-center shrink-0 shadow-sm z-10 ${style.color}">
                                        <i data-lucide="${style.icon}" class="w-3.5 h-3.5"></i>
                                    </div>
                                    <div class="w-[2px] h-full bg-gray-100 mt-1 rounded-full group-last:hidden min-h-[20px]"></div>
                                </div>

                                <!-- 右側內容 -->
                                <div class="pb-5 w-full pt-1">
                                    <div class="font-bold text-gray-800 text-[15px] leading-snug">${item.task}</div>
                                    ${item.loc ? `<div class="text-[12px] text-gray-400 flex items-center gap-1 mt-1 font-bold"><i data-lucide="map-pin" class="w-3 h-3"></i><span>${item.loc}</span></div>` : ''}
                                    
                                    <!-- 紅色警示提醒 (花由晚餐專用) -->
                                    ${item.warning ? `
                                        <div class="mt-2 bg-red-50 border border-red-200 text-red-800 p-3 rounded-xl text-[12px] font-bold leading-relaxed shadow-sm">
                                            <div class="flex items-center gap-1.5 mb-1.5 text-red-600 text-[13px] font-black">
                                                <i data-lucide="alert-triangle" class="w-4 h-4"></i> <span>⚠️ 嚴格規定警示</span>
                                            </div>
                                            ${item.note}
                                        </div>
                                    ` : item.note ? `
                                        <div class="text-[12px] text-gray-500 bg-gray-50 px-3 py-2 rounded-xl leading-relaxed mt-2 font-medium">${item.note}</div>
                                    ` : ''}

                                    <!-- 飲食建議分離卡片 -->
                                    ${(item.noBeef || item.noChicken) ? `
                                        <div class="mt-2.5 space-y-1.5">
                                            ${item.noBeef ? `
                                                <div class="flex items-start text-[12px] bg-white border border-red-100 rounded-lg p-2 shadow-sm">
                                                    <span class="font-black text-red-600 bg-red-100 px-1.5 py-0.5 rounded text-[10px] shrink-0 mr-2 uppercase tracking-wide">不吃牛建議</span>
                                                    <span class="text-gray-700 font-bold leading-snug">${item.noBeef}</span>
                                                </div>
                                            ` : ''}
                                            ${item.noChicken ? `
                                                <div class="flex items-start text-[12px] bg-white border border-orange-100 rounded-lg p-2 shadow-sm">
                                                    <span class="font-black text-orange-600 bg-orange-100 px-1.5 py-0.5 rounded text-[10px] shrink-0 mr-2 uppercase tracking-wide">不吃雞建議</span>
                                                    <span class="text-gray-700 font-bold leading-snug">${item.noChicken}</span>
                                                </div>
                                            ` : ''}
                                        </div>
                                    ` : ''}
                                </div>
                            </div>
                        `;
                    });
                    html += `</div></div>`;
                });
                html += '</div>';
                main.innerHTML = html;

            } else if (currentView === 'lunch') {
                let html = `
                    <div class="p-4 animate-slideIn pb-8">
                        <div class="flex items-center justify-between mb-4">
                            <h2 class="text-lg font-black text-gray-800 pl-1">每日午餐發掘指南</h2>
                        </div>
                        
                        <div class="mb-6 bg-amber-50 border border-amber-100 p-4 rounded-2xl text-[13px] text-amber-800 font-medium leading-relaxed shadow-sm">
                            <div class="flex items-center gap-2 mb-2 font-black text-amber-600 text-[14px]">
                                <i data-lucide="map" class="w-4 h-4"></i> 午餐攻略說明
                            </div>
                            前四天的午餐沒有綁死特定餐廳，大家可以依照當下的行程進度與飢餓程度，在以下推薦區域自由發掘、彈性挑選喜歡的美食喔！
                        </div>
                `;
                
                lunchGuideData.forEach(item => {
                    const colorMap = {
                        blue: { bg: 'bg-blue-50', text: 'text-blue-600', border: 'border-blue-100' },
                        orange: { bg: 'bg-orange-50', text: 'text-orange-600', border: 'border-orange-100' },
                        pink: { bg: 'bg-pink-50', text: 'text-pink-600', border: 'border-pink-100' },
                        green: { bg: 'bg-green-50', text: 'text-green-600', border: 'border-green-100' }
                    };
                    const c = colorMap[item.color];
                    
                    html += `
                        <div class="bg-white rounded-[1.5rem] shadow-sm border border-gray-100 mb-6 overflow-hidden relative no-select">
                            <div class="${c.bg} px-5 py-4 border-b ${c.border} flex items-center justify-between">
                                <div class="flex items-center gap-3">
                                    <span class="${c.text} font-black text-lg">${item.day}</span>
                                    <span class="text-gray-800 font-bold tracking-wide">${item.loc}</span>
                                </div>
                                <div class="${c.text} opacity-80"><i data-lucide="${item.icon}" class="w-5 h-5"></i></div>
                            </div>
                            <div class="p-5">
                                <h4 class="font-black text-gray-800 text-[15px] mb-2">${item.focus}</h4>
                                <p class="text-[13px] text-gray-500 mb-5 leading-relaxed font-medium">${item.desc}</p>
                                <div class="space-y-2.5 bg-gray-50 p-4 rounded-2xl border border-gray-100">
                                    ${item.points.map(p => `
                                        <div class="flex items-start gap-2.5 text-[13px] text-gray-700 font-bold">
                                            <i data-lucide="check-circle-2" class="w-4 h-4 mt-0.5 ${c.text} shrink-0"></i>
                                            <span class="leading-snug">${p}</span>
                                        </div>
                                    `).join('')}
                                </div>
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;
                main.innerHTML = html;

            } else if (currentView === 'hakata' || currentView === 'yufuin') {
                const data = restaurantData
                    .filter(d => currentView === 'yufuin' ? d.area.includes('由布院') : !d.area.includes('由布院'))
                    .sort((a, b) => (a.role === 'dinner' ? -1 : (b.role === 'dinner' ? 1 : 0)));
                
                let cards = data.map(res => {
                    const fb = fallbackUI[res.id];
                    
                    const roleBadge = res.role === 'dinner' 
                        ? `<div class="absolute top-4 right-4 bg-red-600 text-white px-3 py-1 rounded-full text-[10px] font-black shadow-md z-20 flex items-center gap-1"><i data-lucide="moon" class="w-3 h-3"></i> 行程晚餐</div>`
                        : `<div class="absolute top-4 right-4 bg-gray-600/95 backdrop-blur text-white px-3 py-1 rounded-full text-[10px] font-black shadow-md z-20 flex items-center gap-1"><i data-lucide="check-circle-2" class="w-3 h-3 text-green-300"></i> 備用推薦</div>`;

                    return `
                    <div class="bg-white rounded-3xl overflow-hidden shadow-sm border border-gray-100 mb-6 animate-slideIn no-select">
                        <div class="h-44 bg-gray-100 relative">
                            <div class="absolute inset-0 flex flex-col items-center justify-center bg-gradient-to-br ${fb.color} text-white p-4 z-0">
                                <span class="text-4xl mb-1">${fb.emoji}</span>
                                <span class="font-bold text-sm tracking-widest opacity-90">${fb.text}</span>
                            </div>
                            <div class="absolute top-4 left-4 bg-white/95 backdrop-blur px-3 py-1 rounded-full text-[10px] font-black text-orange-600 shadow-sm z-20 uppercase tracking-widest">${res.type}</div>
                            ${roleBadge}
                        </div>
                        <div class="p-5">
                            <div class="mb-3">
                                <h3 class="text-xl font-black text-gray-800 mb-1">${res.name}</h3>
                                <div class="flex items-center text-gray-400 text-[11px] font-bold">
                                    <i data-lucide="map-pin" class="w-3 h-3 mr-1"></i> ${res.area} • ${res.dist}
                                </div>
                            </div>
                            <p class="text-gray-500 text-sm mb-5 leading-relaxed font-medium">${res.desc}</p>
                            
                            <div class="grid grid-cols-1 gap-2 mb-6 text-[13px]">
                                <div class="flex items-center bg-red-50 p-3 rounded-2xl border border-red-100">
                                    <span class="text-[10px] font-black text-red-600 bg-red-100 px-2 py-0.5 rounded-full mr-3 shrink-0 uppercase tracking-wider">不吃牛</span>
                                    <span class="text-gray-700 font-bold leading-tight">${res.noBeef}</span>
                                </div>
                                <div class="flex items-center bg-orange-50 p-3 rounded-2xl border border-orange-100">
                                    <span class="text-[10px] font-black text-orange-600 bg-orange-100 px-2 py-0.5 rounded-full mr-3 shrink-0 uppercase tracking-wider">不吃雞</span>
                                    <span class="text-gray-700 font-bold leading-tight">${res.noChicken}</span>
                                </div>
                            </div>
                            
                            <a href="${res.map}" target="_blank" class="flex items-center justify-center w-full bg-gray-900 text-white py-4 rounded-2xl font-black hover:bg-black active:scale-[0.98] transition-all shadow-lg text-sm">
                                <i data-lucide="map" class="mr-2 w-4 h-4"></i> 查看 Google 地圖導覽
                            </a>
                        </div>
                    </div>
                `}).join('');
                
                main.innerHTML = `
                    <div class="p-4">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-black text-gray-800 pl-1">${currentView === 'yufuin' ? '由布院 美食精選' : '博多 / 天神 美食精選'}</h2>
                        </div>
                        ${cards}
                    </div>
                `;

            } else if (currentView === 'tips') {
                main.innerHTML = `
                    <div class="p-5 animate-slideIn">
                        <div class="flex items-center justify-between mb-6">
                            <h2 class="text-lg font-black text-gray-800 pl-1">點餐翻譯溝通卡</h2>
                        </div>
                        
                        <div class="space-y-5">
                            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-red-50 relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-16 h-16 bg-red-50 rounded-bl-full flex items-center justify-center pt-2 pl-2">
                                    <span class="text-xl">🥩</span>
                                </div>
                                <p class="text-[10px] font-black text-red-600 bg-red-100 px-3 py-1 rounded-full inline-block mb-4">不吃牛出示此畫面</p>
                                
                                <div class="space-y-4">
                                    <div>
                                        <p class="text-gray-400 text-xs font-medium mb-1.5 flex items-center gap-1"><i data-lucide="help-circle" class="w-3 h-3"></i> 詢問餐點成分</p>
                                        <div class="bg-gray-50 p-4 rounded-2xl mb-1.5 text-[17px] font-bold border-l-4 border-red-500 text-gray-800 leading-snug">
                                            「これには牛肉（ぎゅうにく）が入っていますか？」
                                        </div>
                                        <p class="text-gray-500 text-[13px] font-bold">請問這道菜裡面有包含牛肉嗎？</p>
                                    </div>
                                    <div class="w-full h-px bg-gray-100"></div>
                                    <div>
                                        <p class="text-gray-400 text-xs font-medium mb-1.5 flex items-center gap-1"><i data-lucide="thumbs-up" class="w-3 h-3"></i> 請店員推薦</p>
                                        <div class="bg-gray-50 p-4 rounded-2xl mb-1.5 text-[17px] font-bold border-l-4 border-red-500 text-gray-800 leading-snug">
                                            「牛肉が食べられません。豚肉か魚の料理はありますか？」
                                        </div>
                                        <p class="text-gray-500 text-[13px] font-bold">我不吃牛肉。請問有豬肉或魚類的料理嗎？</p>
                                    </div>
                                </div>
                            </div>
                            
                            <div class="bg-white p-6 rounded-[2rem] shadow-sm border border-orange-50 relative overflow-hidden">
                                <div class="absolute top-0 right-0 w-16 h-16 bg-orange-50 rounded-bl-full flex items-center justify-center pt-2 pl-2">
                                    <span class="text-xl">🍗</span>
                                </div>
                                <p class="text-[10px] font-black text-orange-600 bg-orange-100 px-3 py-1 rounded-full inline-block mb-4">不吃雞出示此畫面</p>
                                
                                <div class="space-y-4">
                                    <div>
                                        <p class="text-gray-400 text-xs font-medium mb-1.5 flex items-center gap-1"><i data-lucide="help-circle" class="w-3 h-3"></i> 詢問餐點成分</p>
                                        <div class="bg-gray-50 p-4 rounded-2xl mb-1.5 text-[17px] font-bold border-l-4 border-orange-500 text-gray-800 leading-snug">
                                            「これには鶏肉（とりにく）が入っていますか？」
                                        </div>
                                        <p class="text-gray-500 text-[13px] font-bold">請問這道菜裡面有包含雞肉嗎？</p>
                                    </div>
                                    <div class="w-full h-px bg-gray-100"></div>
                                    <div>
                                        <p class="text-gray-400 text-xs font-medium mb-1.5 flex items-center gap-1"><i data-lucide="thumbs-up" class="w-3 h-3"></i> 請店員推薦</p>
                                        <div class="bg-gray-50 p-4 rounded-2xl mb-1.5 text-[17px] font-bold border-l-4 border-orange-500 text-gray-800 leading-snug">
                                            「鶏肉が食べられません。牛肉か豚肉、魚の料理はありますか？」
                                        </div>
                                        <p class="text-gray-500 text-[13px] font-bold">我不吃雞肉。請問有牛肉、豬肉或魚類的料理嗎？</p>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
            }
            
            // 重新渲染圖示
            if (window.lucide) {
                lucide.createIcons();
            }
            updateNav();
        }

        function updateNav() {
            document.querySelectorAll('.nav-item').forEach(item => {
                const view = item.getAttribute('data-view');
                if (view === currentView) {
                    item.classList.add('text-orange-600');
                    item.classList.remove('text-gray-300');
                    
                    const icon = item.querySelector('i') || item.querySelector('svg');
                    if (icon) icon.classList.add('scale-110');
                } else {
                    item.classList.remove('text-orange-600');
                    item.classList.add('text-gray-300');
                    
                    const icon = item.querySelector('i') || item.querySelector('svg');
                    if (icon) icon.classList.remove('scale-110');
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(render, 100);
        });
    </script>
</body>
</html>
